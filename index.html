<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QuickTools Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>QuickTools Hub</h1>
<p>Free calculators people search for every day.</p>

<div class="card">
<h2>Percentage Calculator</h2>
<input id="part" type="number" placeholder="Part">
<input id="whole" type="number" placeholder="Whole">
<button onclick="calcPct()">Calculate</button>
<p id="pct"></p>
</div>

<div class="card">
<h2>BMI Calculator</h2>
<input id="kg" type="number" placeholder="Weight (kg)">
<input id="cm" type="number" placeholder="Height (cm)">
<button onclick="calcBMI()">Calculate</button>
<p id="bmi"></p>
</div>

<script src="script.js"></script>
</body>
</html>
